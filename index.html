<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BEATRICE</title>

<style>
  /* 🚫 LOCK SCROLL COMPLETELY */
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 40px;

    background: black url('Beatrice.jpg') no-repeat center center fixed;
    background-size: contain;
    font-family: sans-serif;
  }

  .container {
    text-align: center;
    padding: 0.8rem;
    background: #222;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);

    width: 70vw;
    max-width: 380px;

    animation: float 2s ease-in-out infinite;
  }

  @keyframes float {
    0% { transform: translateY(15px); }
    50% { transform: translateY(5px); }
    100% { transform: translateY(15px); }
  }

  h1 {
    color: white;
    margin: 0;
    font-size: 1.4rem;
  }

  audio {
    width: 100%;
    margin-top: 0.7rem;
  }

  button {
    padding: 0.4rem 0.8rem;
    margin: 0.2rem;
    background: #111;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.9rem;
  }

  button:hover {
    background: #444;
  }

  #trackTitle {
    margin-top: 0.7rem;
    color: white;
    font-size: 0.95rem;
  }

  #endScreen {
    display: none;
    margin-top: 0.7rem;
    color: white;
    font-size: 0.9rem;
  }
</style>
</head>

<body>

<div class="container">
  <h1>BEATRICE</h1>

  <audio id="player" controls></audio>

  <div class="controls">
    <button id="startBtn">▶️ Start Listening</button>

    <div id="navControls" style="display:none;">
      <button id="prevBtn">⏮️ Prev</button>
      <button id="nextBtn">Next ⏭️</button>
    </div>
  </div>

  <div id="trackTitle"></div>

  <div id="endScreen">
    <p>Play again?</p>
    <button onclick="restart()">Yes</button>
    <button onclick="stopPlayer()">No</button>
  </div>
</div>

<script>
const tracks = [
  { src: "music/track1.ogg", title: "untitled01" },
  { src: "music/track2.ogg", title: "untitled02" },
  { src: "music/track3.ogg", title: "untitled03" },
  { src: "music/track4.ogg", title: "untitled04" },
  { src: "music/track5.ogg", title: "untitled05" },
  { src: "music/track6.ogg", title: "untitled06" }
];

const player = document.getElementById("player");
const startBtn = document.getElementById("startBtn");
const navControls = document.getElementById("navControls");
const trackTitle = document.getElementById("trackTitle");
const endScreen = document.getElementById("endScreen");

let currentTrack = 0;

function loadTrack(index, autoplay = true) {
  currentTrack = index;

  player.src = tracks[currentTrack].src;
  trackTitle.textContent = tracks[currentTrack].title;

  if (autoplay) {
    player.play().catch(() => {});
  }

  endScreen.style.display = "none";
}

function nextTrack() {
  if (currentTrack === tracks.length - 1) {
    showEndScreen();
    return;
  }
  loadTrack(currentTrack + 1);
}

function prevTrack() {
  if (currentTrack > 0) {
    loadTrack(currentTrack - 1);
  }
}

function showEndScreen() {
  endScreen.style.display = "block";
  player.pause();
}

function restart() {
  loadTrack(0);
}

function stopPlayer() {
  player.pause();
  endScreen.style.display = "none";
}

player.addEventListener("ended", nextTrack);

document.getElementById("nextBtn").addEventListener("click", nextTrack);
document.getElementById("prevBtn").addEventListener("click", prevTrack);

startBtn.addEventListener("click", () => {
  startBtn.style.display = "none";
  navControls.style.display = "inline";
  loadTrack(0);
});
</script>

</body>
</html>
