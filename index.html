<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BEATRICE</title>

<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    background:#ababab url('loosies.jpg') no-repeat center center fixed;
    background-size: contain; 
    font-family: sans-serif;
  }

  .container {
    text-align: center;
    padding: 1rem;
    background-color: #222;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    animation: float 2s ease-in-out infinite;
    margin-top: 180px;
    transform: translateY(30px);
    width: 80vw;
    max-width: 500px;
  }

  @keyframes float {
    0% { transform: translateY(30px); }
    50% { transform: translateY(20px); }
    100% { transform: translateY(30px); }
  }

  h1 {
    color: white;
    font-size: 2rem;
    margin: 0;
    text-align: center;
  }

  audio {
    width: 100%;
    margin-top: 1rem;
    border-radius: 8px;
    outline: none;
  }

  .controls {
    margin-top: 1rem;
  }

  button {
    padding: 0.5rem 1rem;
    margin: 0 0.5rem;
    background-color: #111;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 1rem;
  }

  button:hover {
    background-color: #444;
  }

  #trackTitle {
    margin-top: 1rem;
    color: white;
    font-size: 1.1rem;
  }
</style>
</head>

<body>

<div class="container">
  <h1>BEATRICE</h1>

  <audio id="player" controls></audio>

  <div class="controls">
    <button id="startBtn">▶️ Start Listening</button>
    <div id="navControls" style="display:none;">
      <button id="prevBtn">⏮️ Prev</button>
      <button id="nextBtn">Next ⏭️</button>
    </div>
  </div>

  <div id="trackTitle"></div>
</div>

<script>
const tracks = [
  { src: "music/track1.ogg", title: "untitled01" },
  { src: "music/track2.ogg", title: "untitled02" },
  { src: "music/track3.ogg", title: "untitled03" },
  { src: "music/track4.ogg", title: "untitled04" },
  { src: "music/track5.ogg", title: "untitled05" },
  { src: "music/track6.ogg", title: "untitled06" }
];

const player = document.getElementById("player");
const startBtn = document.getElementById("startBtn");
const navControls = document.getElementById("navControls");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const trackTitle = document.getElementById("trackTitle");

let currentTrack = 0;

// preload
const preloaded = tracks.map(t => {
  const a = new Audio();
  a.src = t.src;
  a.preload = "auto";
  return a;
});

function playTrack(index) {
  currentTrack = index;

  player.src = tracks[currentTrack].src;
  player.play().catch(err => console.log(err));

  trackTitle.textContent = tracks[currentTrack].title;

  // preload next
  const nextIndex = (currentTrack + 1) % tracks.length;
  preloaded[nextIndex].load();
}

player.addEventListener("ended", () => {
  let nextIndex = (currentTrack + 1) % tracks.length;
  playTrack(nextIndex);
});

nextBtn.addEventListener("click", () => {
  let nextIndex = (currentTrack + 1) % tracks.length;
  playTrack(nextIndex);
});

prevBtn.addEventListener("click", () => {
  let prevIndex = (currentTrack - 1 + tracks.length) % tracks.length;
  playTrack(prevIndex);
});

startBtn.addEventListener("click", () => {
  startBtn.style.display = "none";
  navControls.style.display = "inline";
  playTrack(0);
});
</script>

</body>
</html>
