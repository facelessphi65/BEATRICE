<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BEATRICE</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  padding-bottom: 40px;

  background: black url('Beatrice.jpg') no-repeat center center fixed;
  background-size: contain;

  font-family: "Algerian", serif;
}

/* 🟤 PLAYER */
.container {
  text-align: center;
  padding: 0.85rem;

  background: #3b2a1f;
  border-radius: 10px;

  box-shadow: 0 0 25px rgba(0,0,0,0.7);

  width: 70vw;
  max-width: 380px;

  animation: float 2s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(15px); }
  50% { transform: translateY(5px); }
  100% { transform: translateY(15px); }
}

/* 🎧 TITLE */
h1 {
  color: #f0e3d2;
  margin: 0;
  font-size: 1.6rem;
}

/* ⚠️ SUBTITLE (hidden first) */
.subtitle {
  display: none;
  margin-top: 4px;
  color: #e6d2b5;
  font-size: 0.8rem;
}

/* 🎵 TRACK TEXT */
#trackTitle {
  margin-top: 0.7rem;
  color: #e6d2b5;
  font-size: 1rem;
}

/* 🎧 AUDIO */
audio {
  width: 100%;
  margin-top: 0.7rem;
}

/* 🔘 BUTTONS */
button {
  padding: 0.4rem 0.8rem;
  margin: 0.2rem;

  background: #1f140e;
  color: #f0e3d2;

  border: 1px solid #6b4a32;
  border-radius: 5px;

  cursor: pointer;
  font-size: 0.9rem;

  font-family: "Algerian", serif;
}

button:hover {
  background: #3a2418;
}

/* 🔚 END SCREEN */
#endScreen {
  display: none;
  margin-top: 0.7rem;
  color: #e6d2b5;
  font-size: 0.95rem;
}
</style>
</head>

<body>

<div class="container">

  <h1>BEATRICE</h1>

  <!-- ⚠️ SUBTITLE -->
  <div class="subtitle" id="subtitle">
    ⚠️ (not mastered, turn phone volume up)
  </div>

  <audio id="player" controls></audio>

  <div class="controls">
    <button id="startBtn">▶️ Start Listening</button>

    <div id="navControls" style="display:none;">
      <button id="prevBtn">⏮️ Prev</button>
      <button id="nextBtn">Next ⏭️</button>
    </div>
  </div>

  <div id="trackTitle"></div>

  <div id="endScreen">
    <p>Play again?</p>
    <button onclick="restart()">Yes</button>
    <button onclick="stopPlayer()">No</button>
  </div>

</div>

<script>
const tracks = [
  { src: "music/track1.ogg", title: "untitled01" },
  { src: "music/track2.ogg", title: "untitled02" },
  { src: "music/track3.ogg", title: "untitled03" },
  { src: "music/track4.ogg", title: "untitled04" },
  { src: "music/track5.ogg", title: "untitled05" },
  { src: "music/track6.ogg", title: "untitled06" }
];

const player = document.getElementById("player");
const startBtn = document.getElementById("startBtn");
const navControls = document.getElementById("navControls");
const trackTitle = document.getElementById("trackTitle");
const endScreen = document.getElementById("endScreen");
const subtitle = document.getElementById("subtitle");

let currentTrack = 0;

function loadTrack(index, autoplay = true) {
  currentTrack = index;

  player.src = tracks[currentTrack].src;
  trackTitle.textContent = tracks[currentTrack].title;

  if (autoplay) player.play().catch(() => {});

  endScreen.style.display = "none";
}

function nextTrack() {
  if (currentTrack === tracks.length - 1) {
    showEndScreen();
    return;
  }
  loadTrack(currentTrack + 1);
}

function prevTrack() {
  if (currentTrack > 0) {
    loadTrack(currentTrack - 1);
  }
}

function showEndScreen() {
  endScreen.style.display = "block";
  player.pause();
}

function restart() {
  loadTrack(0);
}

function stopPlayer() {
  player.pause();
  endScreen.style.display = "none";
}

player.addEventListener("ended", nextTrack);

document.getElementById("nextBtn").addEventListener("click", nextTrack);
document.getElementById("prevBtn").addEventListener("click", prevTrack);

startBtn.addEventListener("click", () => {
  startBtn.style.display = "none";
  navControls.style.display = "inline";

  // ⚠️ show subtitle only after start
  subtitle.style.display = "block";

  loadTrack(0);
});
</script>

</body>
</html>
